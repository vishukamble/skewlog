<svg width="240" height="240" viewBox="0 0 240 240" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="atomicGlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFB74D;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FF9800;stop-opacity:1" />
    </linearGradient>

    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3" />
      <feOffset dx="2" dy="4" result="offsetblur" />
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.3" />
      </feComponentTransfer>
      <feMerge>
        <feMergeNode />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <g transform="translate(55, 60)">
    <path d="M0 0 L100 0 L85 40 L-15 40 Z" fill="#9298B0" opacity="0.3" />

    <path d="M42 20 L57 60" stroke="#FFB74D" stroke-width="2.5" stroke-dasharray="4 3" opacity="0.8" />

    <path d="M15 40 L115 40 L100 80 L0 80 Z" fill="url(#atomicGlow)" filter="url(#shadow)">
      <animate attributeName="opacity" values="1;0.85;1" dur="5s" repeatCount="indefinite" />
    </path>

    <circle cx="57" cy="60" r="4.5" fill="#FFB74D" filter="url(#shadow)" />
  </g>

  <text x="120" y="195" text-anchor="middle"
        font-family="'JetBrains Mono', 'Fira Code', 'Courier New', monospace"
        font-weight="900" font-size="30" fill="#9298B0"
        transform="translate(120,195) skewX(-15) translate(-120,-195)">
    skew<tspan fill="#FF9800">log</tspan>
  </text>
</svg>